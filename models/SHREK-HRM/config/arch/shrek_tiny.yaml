# SHREK-Tiny — ~7-8M parameters, competes with Tiny Recursive Model (TRM)
# Follows TRM's approach: keep hidden_size=512 (same as Large) but reduce layers.
# TRM showed that small recursive models need wide hidden states for adequate
# representation capacity — reducing hidden_size causes training collapse.
#
# head_dim stays 64: 512/8 = 64 (same as SHREK-Large)
# Params saved by halving layers (2+2 vs 4+4), not by shrinking hidden_size.

name: hrm.hrm_act_v1@HierarchicalReasoningModel_ACTV1
loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy

halt_exploration_prob: 0.1
halt_max_steps: 16  # same as HRM — fair comparison at equal compute

H_cycles: 2
L_cycles: 2

# SHREK: reduced from 4 to 2 layers each (same approach as TRM)
# Keeps hidden_size=512 for stable training, saves params via fewer layers
H_layers: 2
L_layers: 2

hidden_size: 512   # same as Large and TRM — prevents training collapse
num_heads: 8       # head_dim = 512/8 = 64
expansion: 4       # same as HRM baseline — fair comparison

puzzle_emb_ndim: ${.hidden_size}

pos_encodings: rope
