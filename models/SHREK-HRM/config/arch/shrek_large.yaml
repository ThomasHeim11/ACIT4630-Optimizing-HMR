# SHREK-Large — ~27M parameters, competes with HRM and AugmentedHRM
# Same parameter count as HRM but with SHREK improvements:
#   - universal flip rate + learned error estimator (no task rules)
#   - error injection replaces random perturbation
#   - stagnation delta fed into Q-head
#   - Q-target cached in carry (no second forward pass)
#
# Key differences from hrm_v1.yaml:
#   expansion: 2  (was 4) — halves FFN size, lowers FLOPs
#   halt_max_steps: 32 (was 16) — more thinking steps allowed

name: hrm.hrm_act_v1@HierarchicalReasoningModel_ACTV1
loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy

halt_exploration_prob: 0.1
halt_max_steps: 16  # same as HRM — fair comparison at equal compute

H_cycles: 2
L_cycles: 2

H_layers: 4
L_layers: 4

hidden_size: 512
num_heads: 8   # head_dim = 512/8 = 64
expansion: 2   # SHREK: halved from 4 — cuts FFN FLOPs by 50%

puzzle_emb_ndim: ${.hidden_size}

pos_encodings: rope
