# SHREK-Tiny — ~7M parameters, competes with Tiny Recursive Model (TRM)
# Same architecture as SHREK-Large, just smaller hidden_size and num_heads.
# TRM (7M) beats original HRM (27M) on all benchmarks — this targets that slot.
#
# head_dim stays 64: 256/4 = 64 (same as SHREK-Large: 512/8 = 64)
# FLOPs roughly 4x lower than SHREK-Large (scales as hidden_size^2)

name: hrm.hrm_act_v1@HierarchicalReasoningModel_ACTV1
loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy

halt_exploration_prob: 0.1
halt_max_steps: 16  # same as HRM — fair comparison at equal compute

H_cycles: 2
L_cycles: 2

H_layers: 4
L_layers: 4

hidden_size: 256   # SHREK: halved from 512 — ~7M params
num_heads: 4       # head_dim = 256/4 = 64 (same ratio as Large)
expansion: 2       # SHREK: halved from 4 — cuts FFN FLOPs by 50%

puzzle_emb_ndim: ${.hidden_size}

pos_encodings: rope
